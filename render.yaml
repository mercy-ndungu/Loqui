# Optional Render Blueprint (repo root). Set secrets in the Render dashboard.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: loqui-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: TRANSCRIPTION_PROVIDER
        value: whisper
      - key: WHISPER_MODEL
        value: base
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
